<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Odoo for Thunderbird – Einstellungen</title>
    <style>
      :root {
        --odoo: #714b67;
        --bg: #fff;
        --fg: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --card: #f9fafb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --fg: #e5e7eb;
          --muted: #9ca3af;
          --border: #3a3a3a;
          --card: #262626;
        }
      }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
        background: var(--bg);
        max-width: 560px;
        margin: 40px auto;
        padding: 0 20px;
        font-size: 14px;
        line-height: 1.5;
      }
      h1 {
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      h1 img {
        width: 26px;
        height: 26px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 18px 0 6px;
      }
      input[type="text"] {
        width: 100%;
        padding: 9px 10px;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--card);
        color: var(--fg);
        box-sizing: border-box;
      }
      .hint {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
      }
      button {
        margin-top: 20px;
        padding: 9px 16px;
        font: inherit;
        border: none;
        border-radius: 6px;
        background: var(--odoo);
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
      #status {
        margin-top: 14px;
        font-size: 13px;
        min-height: 18px;
      }
      .ok {
        color: #15803d;
      }
      .err {
        color: #b91c1c;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <h1><img src="../icons/odoo-64.png" alt="" /> Odoo for Thunderbird</h1>
    <p class="hint">
      Voraussetzung: In Odoo unter <em>Einstellungen › Allgemeine Einstellungen ›
      Integrationen</em> muss <strong>Mail-Plugin</strong> aktiviert sein.
    </p>

    <label for="baseUrl">Odoo-Adresse</label>
    <input
      id="baseUrl"
      type="text"
      placeholder="https://meinefirma.odoo.com"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="hint">Die Basis-URL deiner Datenbank, ohne Pfad am Ende.</div>

    <div class="row">
      <button id="save">Speichern & Zugriff erlauben</button>
    </div>
    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
